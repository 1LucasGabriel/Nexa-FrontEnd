<main>
    <app-side-menu></app-side-menu>

    <section>
        <div class="header-section">
            <h1>Cadastrar Funcionários</h1>

            <div class="button-search">
                <app-dynamic-button [text]="buttonText" [isRounded]="true" (buttonClick)="addEmployee()"></app-dynamic-button>
                <app-dynamic-search-bar></app-dynamic-search-bar>
            </div>
        </div>

        <app-dynamic-table [columns]="columns" [data]="data" [actions]="actions" (onAction)="handleAction($event)" [statusColorMap]="statusColorMap"></app-dynamic-table>
    </section>

    <app-dynamic-modal [config]="config" [visible]="isModalOpen" (visibleChange)="isModalOpen = $event"></app-dynamic-modal>
</main>
